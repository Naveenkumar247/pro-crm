<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-2xl font-bold">Pro CRM</h1>
        <div class="space-x-2">
            <a href="/scan" class="bg-purple-500 hover:bg-purple-600 px-4 py-2 rounded font-semibold transition">📷 Scan QR</a>
            <a href="/form" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded font-semibold transition">+ Add User</a>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8">
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500 text-center">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Total Users</h3>
                <p class="text-3xl font-bold" id="stat-total">-</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500 text-center">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Active</h3>
                <p class="text-3xl font-bold text-green-600" id="stat-active">-</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-red-500 text-center">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Inactive</h3>
                <p class="text-3xl font-bold text-red-600" id="stat-inactive">-</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-yellow-500 text-center">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Cold Calls</h3>
                <p class="text-3xl font-bold text-yellow-600" id="stat-calls">-</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-purple-500 text-center">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Reminders</h3>
                <p class="text-3xl font-bold text-purple-600" id="stat-reminders">-</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="min-w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4 font-semibold text-gray-600">Name (Clickable)</th>
                        <th class="p-4 font-semibold text-gray-600">Contact</th>
                        <th class="p-4 font-semibold text-gray-600">Plan</th>
                        <th class="p-4 font-semibold text-gray-600">Status</th>
                        <th class="p-4 font-semibold text-gray-600">QR Code</th>
                    </tr>
                </thead>
                <tbody id="user-table-body" class="divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        fetch('/api/stats').then(res => res.json()).then(data => {
            document.getElementById('stat-total').innerText = data.totalUsers;
            document.getElementById('stat-active').innerText = data.activeUsers;
            document.getElementById('stat-inactive').innerText = data.inactiveUsers;
            document.getElementById('stat-calls').innerText = data.coldCalls;
            document.getElementById('stat-reminders').innerText = data.reminders;
        });

        fetch('/api/users').then(res => res.json()).then(users => {
            const tbody = document.getElementById('user-table-body');
            users.forEach(user => {
                const statusBadge = user.active 
                    ? `<span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-bold">Active</span>` 
                    : `<span class="bg-red-100 text-red-800 px-2 py-1 rounded text-xs font-bold">Inactive</span>`;
                
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4">
                            <a href="/user/${user.username}" class="block p-2 -m-2 rounded hover:bg-blue-50">
                                <div class="font-bold text-blue-600">${user.name}</div>
                                <div class="text-xs text-gray-500">@${user.username}</div>
                            </a>
                        </td>
                        <td class="p-4 text-sm">
                            <div>${user.phonenumber}</div>
                            <div class="text-gray-500">${user.email}</div>
                        </td>
                        <td class="p-4 text-sm font-semibold">${user.plan} <span class="font-normal text-gray-500">(${user.planDuration})</span></td>
                        <td class="p-4">${statusBadge}</td>
                        <td class="p-4 flex items-center space-x-3">
                            <img src="${user.qrCode}" class="w-12 h-12 border rounded shadow-sm" alt="QR">
                            <a href="${user.qrCode}" download="${user.username}-QR.png" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-800 py-1 px-2 rounded font-semibold transition">
                                Download
                            </a>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
